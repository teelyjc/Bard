services:
  # Child bots start first; master waits until both are healthy.
  child0:
    build: .
    command: [ "child", "0" ]
    restart: unless-stopped
    volumes:
      - ./config.docker.json:/app/config.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8081/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  child1:
    build: .
    command: [ "child", "1" ]
    restart: unless-stopped
    volumes:
      - ./config.docker.json:/app/config.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8082/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  master:
    build: .
    command: master
    restart: unless-stopped
    volumes:
      - ./config.docker.json:/app/config.json:ro
    ports:
      - 9090:9090
    depends_on:
      child0:
        condition: service_healthy
      child1:
        condition: service_healthy
